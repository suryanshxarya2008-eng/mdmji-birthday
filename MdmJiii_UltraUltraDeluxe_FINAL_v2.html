<style>
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#0b1026,#25114f);color:#fff;overflow:hidden}
.page{display:none;height:100vh;justify-content:center;align-items:center;flex-direction:column;padding:20px;text-align:center}
.active{display:flex}
.glass{background:rgba(255,255,255,.08);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.15);border-radius:30px;padding:25px;width:min(92%,900px)}
button{padding:12px 22px;border:none;border-radius:25px;cursor:pointer}
h1{font-size:3rem;text-shadow:0 0 15px #fff,0 0 30px #ff66cc}
#meter{font-size:90px;font-weight:bold}
.bar{width:90%;height:18px;background:#333;border-radius:20px;margin:auto;overflow:hidden}
.fill{height:100%;width:0;background:linear-gradient(90deg,#ff4d9d,#7b68ee)}
.flip{width:240px;height:150px;perspective:1000px;margin:10px}
.inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:.8s}
.flip.open .inner{transform:rotateY(180deg)}
.face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:20px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.15);padding:10px}
.back{transform:rotateY(180deg)}
.grid{display:flex;flex-wrap:wrap;justify-content:center}
.reason{background:rgba(255,255,255,.12);padding:10px;margin:8px;border-radius:12px;text-align:left}
#reasons{max-height:55vh;overflow:auto}
.fire{position:fixed;font-size:22px;animation:boom 2s linear forwards}
@keyframes boom{from{opacity:1;transform:scale(.2)}to{opacity:0;transform:scale(5)}}
.shake{animation:shake .5s}
@keyframes shake{25%{transform:translateX(6px)}50%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
</style>
</head>

<script>
function show(n){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById('p'+n).classList.add('active');
if(n===7){fireworks(120);}
}

function fireworks(count){
for(let i=0;i<count;i++){
let f=document.createElement('div');
f.className='fire';
f.innerHTML=['✨','🎆','🎇'][Math.floor(Math.random()*3)];
f.style.left=Math.random()*100+'vw';
f.style.top=Math.random()*100+'vh';
document.body.appendChild(f);
setTimeout(()=>f.remove(),2000);
}
}

function startMeter(){
const seq=[0,10,25,50,75,100,101,150,250,500,1000,10000];
let i=0;
let m=document.getElementById('meter');
let fill=document.getElementById('fill');
let status=document.getElementById('status');

function step(){
 if(i<seq.length){
   m.innerHTML=seq[i]+'%';
   fill.style.width=Math.min(seq[i],100)+'%';
   if(seq[i]>100){ status.innerHTML='⚡ Overloaded...'; }
   i++;
   setTimeout(step,600);
 }else{
   m.innerHTML='♾️';
   status.innerHTML='♾️ Infinity Reached';
   fireworks(80);

   setTimeout(()=>{
      status.innerHTML='Result:<br><br>♾️ INFINITE';
      setTimeout(()=>{
         status.innerHTML += '<br><br>❤️ Mdm Jiii Love Analysis Complete ❤️';
         fireworks(120);
         setTimeout(()=>show(3),2500);
      },1200);
   },1200);
 }
}
step();
}

d.className='flip';
d.innerHTML='<div class="inner"><div class="face">🎁 Gift '+(i+1)+'</div><div class="face back">'+g+'</div></div>';
d.onclick=()=>d.classList.toggle('open');
document.getElementById('gifts').appendChild(d);
});
